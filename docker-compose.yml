version: "3.9"

name: releasegenerator

services:
  ollama:
    image: ollama/ollama:latest
    container_name: releasegenerator-ollama
    restart: always
    volumes:
      - ollama:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    networks:
      - traefik_proxy

  releasegenerator:
    image: registry.domain.net/releasegenerator/api:latest
    container_name: releasegenerator-api
    restart: always
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ReleaseGenerator__Ollama__BaseUrl: http://ollama:11434

      ReleaseGenerator__Languages__0: "en"

      ReleaseGenerator__Formats__store__ExampleTemplate: |-
        What's New in {version}:
        • ...
        • ...
    depends_on:
      - ollama
    labels:
      - "traefik.enable=true"
  
      - "traefik.http.routers.releasegenerator.rule=Host(`releasegenerator.domain.net`)"
      - "traefik.http.routers.releasegenerator.entrypoints=websecure"
      - "traefik.http.routers.releasegenerator.tls=true"
      - "traefik.http.routers.releasegenerator.tls.certresolver=myresolver"
      - "traefik.http.services.releasegenerator.loadbalancer.server.port=8080"
      - "traefik.http.routers.releasegenerator.middlewares=rate-limit-global@file"
  
      - "traefik.http.routers.releasegenerator-http.rule=Host(`releasegenerator.domain.net`)"
      - "traefik.http.routers.releasegenerator-http.entrypoints=web"
      - "traefik.http.routers.releasegenerator-http.middlewares=redirect-to-https@file"
    networks:
      - traefik_proxy

volumes:
  ollama:

networks:
  traefik_proxy:
    external: true